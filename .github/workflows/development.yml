name: CI - Development

on:
  push:
    branches:
      - development
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - development

jobs:
  build:
    name: Build, Test and Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Cache OWASP NVD database
        uses: actions/cache@v5
        with:
          path: ~/.cache/dependency-check
          key: ${{ runner.os }}-owasp-nvd
          restore-keys: ${{ runner.os }}-owasp-nvd
      - name: Build, test and check coverage
        run: mvn -B verify -Ddependency-check.cacheDirectory=$HOME/.cache/dependency-check
